[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
# Narrow the suppressions to specific known-noise warnings instead of
# blanket-ignoring every DeprecationWarning (which hid real issues like
# asyncio.get_event_loop() usage). Add targeted entries here only when a
# warning is confirmed noise.
filterwarnings =
    ignore::DeprecationWarning:websockets.*