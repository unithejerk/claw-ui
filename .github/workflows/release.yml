name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SemVer tag
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${{ github.ref_name }}' is not valid SemVer (expected vX.Y.Z)"
            exit 1
          fi

  test:
    uses: ./.github/workflows/ci.yml

  release:
    needs: [validate, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build bundle
        run: python install.py -o openclaw_pipe_bundle.py

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          files: openclaw_pipe_bundle.py
          generate_release_notes: false
